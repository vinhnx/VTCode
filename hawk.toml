[[production]]
package = "vtcode"
bin = "vtcode"
reason = "shipped terminal coding agent binary"

[[feature-profile]]
name = "all"
all-features = true

[[feature-profile]]
name = "default"

[[feature-profile]]
name = "minimal"
no-default-features = true

[[doctest]]
package = "vtcode-exec-events"

[[doctest]]
package = "vtcode-commons"

