name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., 0.81.2)'
        required: true
        type: string
      build_windows:
        description: 'Also build Windows x86_64 artifact'
        required: false
        type: boolean
        default: true
      build_macos:
        description: 'Also build macOS artifacts (uses macos-latest; opt-in to save wall-clock time)'
        required: false
        type: boolean
        default: false

permissions: {}

# This repo is public, so standard ubuntu-latest, windows-latest, and
# macos-latest runners are all free and do not consume any account quota.
# See https://docs.github.com/billing/managing-billing-for-github-actions/about-billing-for-github-actions
# Windows is on by default; macOS remains opt-in because the macOS jobs are
# the slowest part of the release and we don't ship macOS binaries every cut.

jobs:
  validate-release-input:
    name: Validate release trigger and tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure release runs from main
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Release workflow must run from main (got '${GITHUB_REF_NAME}')." >&2
            exit 1
          fi
      - name: Validate release tag format
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ ! "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not semver-like. Expected forms such as 0.81.2 or v0.81.2." >&2
            exit 1
          fi

  build-linux:
    name: Build (${{ matrix.target }})
    needs: validate-release-input
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git --rev f8151ae777290430cf2108efacf3976d9528500b --locked

      - name: Build (${{ matrix.target }})
        run: cross build --release --target ${{ matrix.target }}
        shell: bash
        env:
          RUSTFLAGS: ${{ startsWith(matrix.target, 'x86_64') && '-C target-cpu=x86-64' || '' }}

      - name: Verify Linux TLS linkage
        shell: bash
        run: |
          set -euo pipefail

          check_absent() {
            local package="$1"
            local tree_output

            set +e
            tree_output="$(cargo tree -e normal -i "$package" --target "${{ matrix.target }}" 2>&1)"
            local status=$?
            set -e

            if printf '%s\n' "$tree_output" | grep -Eq "^${package} v"; then
              echo "✗ ${package} detected in Linux dependency graph" >&2
              printf '%s\n' "$tree_output" >&2
              exit 1
            fi

            if [ "$status" -ne 0 ] \
              && ! printf '%s\n' "$tree_output" | grep -Eq "nothing to print\\.|did not match any packages"; then
              echo "✗ Failed to inspect ${package} dependency graph" >&2
              printf '%s\n' "$tree_output" >&2
              exit "$status"
            fi
          }

          check_absent native-tls
          check_absent openssl-sys
          echo "✓ Linux dependency graph is rustls-only (no native-tls/openssl-sys)"

      - name: Check Binary
        shell: bash
        run: |
          if [ -f "target/${{ matrix.target }}/release/vtcode" ]; then
            echo "✓ Found Unix binary: vtcode"
          else
            echo "✗ Binary not found!" && exit 1
          fi

      - name: Package
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          cargo run -p xtask -- package-release \
            --target "${{ matrix.target }}" \
            --version "$VERSION" \
            --binary "target/${{ matrix.target }}/release/vtcode" \
            --out-dir dist
          ARCHIVE="dist/vtcode-${{ matrix.target }}-v${VERSION}.tar.gz"
          if command -v sha256sum &> /dev/null; then
            sha256sum "$ARCHIVE" > "dist/vtcode-${{ matrix.target }}-v${VERSION}.sha256"
          elif command -v shasum &> /dev/null; then
            shasum -a 256 "$ARCHIVE" > "dist/vtcode-${{ matrix.target }}-v${VERSION}.sha256"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            dist/vtcode-${{ matrix.target }}-v*.tar.gz
            dist/vtcode-${{ matrix.target }}-v*.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  build-windows:
    # Free on public repos via standard windows-latest; can be disabled per-run
    # via the build_windows input.
    if: ${{ inputs.build_windows == true || github.event.inputs.build_windows == 'true' }}
    name: Build (x86_64-pc-windows-msvc)
    needs: validate-release-input
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build (x86_64-pc-windows-msvc)
        run: cargo build --release --target x86_64-pc-windows-msvc
        shell: bash

      - name: Check Binary
        shell: bash
        run: |
          if [ -f "target/x86_64-pc-windows-msvc/release/vtcode.exe" ]; then
            echo "✓ Found Windows binary: vtcode.exe"
          else
            echo "✗ Binary not found!" && exit 1
          fi

      - name: Package
        shell: pwsh
        run: |
          $archive = "vtcode-${{ github.event.inputs.tag }}-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "target/x86_64-pc-windows-msvc/release/vtcode.exe" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "vtcode-${{ github.event.inputs.tag }}-x86_64-pc-windows-msvc.sha256" -Value $hash -NoNewline

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-x86_64-pc-windows-msvc
          path: |
            vtcode-${{ github.event.inputs.tag }}-x86_64-pc-windows-msvc.zip
            vtcode-${{ github.event.inputs.tag }}-x86_64-pc-windows-msvc.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  build-macos:
    if: ${{ inputs.build_macos == true || github.event.inputs.build_macos == 'true' }}
    name: Build (${{ matrix.target }})
    needs: validate-release-input
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Build (${{ matrix.target }})
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Check Binary
        shell: bash
        run: |
          if [ -f "target/${{ matrix.target }}/release/vtcode" ]; then
            echo "✓ Found Unix binary: vtcode"
          else
            echo "✗ Binary not found!" && exit 1
          fi

      - name: Package
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          cargo run -p xtask -- package-release \
            --target "${{ matrix.target }}" \
            --version "$VERSION" \
            --binary "target/${{ matrix.target }}/release/vtcode" \
            --out-dir dist
          ARCHIVE="dist/vtcode-${{ matrix.target }}-v${VERSION}.tar.gz"
          if command -v sha256sum &> /dev/null; then
            sha256sum "$ARCHIVE" > "dist/vtcode-${{ matrix.target }}-v${VERSION}.sha256"
          elif command -v shasum &> /dev/null; then
            shasum -a 256 "$ARCHIVE" > "dist/vtcode-${{ matrix.target }}-v${VERSION}.sha256"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            dist/vtcode-${{ matrix.target }}-v*.tar.gz
            dist/vtcode-${{ matrix.target }}-v*.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  create-release:
    name: Create GitHub Release
    needs: [validate-release-input, build-linux, build-windows, build-macos]
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Full fetch to get all tags for changelog generation
          persist-credentials: false

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage install scripts
        run: |
          # Copy install scripts to artifacts directory for release
          cp scripts/install.sh artifacts/
          cp scripts/install.ps1 artifacts/
          chmod +x artifacts/install.sh

      - name: Generate checksums.txt
        shell: bash
        run: |
          cd artifacts
          # Aggregate all .sha256 files into a single checksums.txt
          # Each .sha256 file contains: <hash>  <filename>
          # We extract and merge them into one unified file
          > checksums.txt
          for f in *.sha256; do
            if [ -f "$f" ]; then
              cat "$f" >> checksums.txt
            fi
          done
          if [ -s checksums.txt ]; then
            echo "Generated checksums.txt:"
            cat checksums.txt
          else
            echo "No checksums found to aggregate" >&2
            exit 1
          fi

      - name: Generate Changelog
        id: changelog
        run: |
          # Fetch all tags if not available
          git fetch --tags --force

          # Find the most recent tag that follows SemVer (vX.Y.Z or X.Y.Z) in commit history
          # We exclude the tag currently being released
          PREV_TAG=$(git log --tags --simplify-by-decoration --pretty="format:%D" | grep -oE "tag: v?[0-9]+\.[0-9]+\.[0-9]+" | sed 's/tag: //;s/,.*//' | grep -vE "^(v)?${{ github.event.inputs.tag }}$" | head -n 1)

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to HEAD"
            while IFS= read -r commit_line; do
              if [ -n "$commit_line" ]; then
                COMMIT_HASH=$(echo "$commit_line" | cut -d'|' -f1)
                COMMIT_SUBJECT=$(echo "$commit_line" | cut -d'|' -f2)
                echo "- $COMMIT_SUBJECT ($COMMIT_HASH)" >> release_notes.md
              fi
            done < <(git log "$PREV_TAG"..HEAD --no-merges --pretty=format:"%h|%s")
            echo "" >> release_notes.md
            echo "**Full Changelog**: https://github.com/vinhnx/vtcode/compare/$PREV_TAG...${{ github.event.inputs.tag }}" >> release_notes.md
          else
            echo "Initial release." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
            artifacts/checksums.txt
            artifacts/install.sh
            artifacts/install.ps1
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
