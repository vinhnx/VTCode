name: tool-eval
permissions: {}

on:
  push:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/**'

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  RUSTFLAGS: "-D warnings"

# Set default shell
defaults:
  run:
    shell: bash

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install ripgrep (for grep_search)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build
        run: cargo build --locked --workspace --quiet

      - name: Run tool smoke harness
        run: |
          set -euo pipefail
          bash scripts/test_tools_e2e.sh | tee tool-eval.log
          bash scripts/test_pty_tools.sh | tee -a tool-eval.log

      - name: Upload eval artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tool-eval-artifacts
          path: |
            tool-eval.log
            tool-eval.json
