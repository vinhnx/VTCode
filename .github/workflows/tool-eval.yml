name: tool-eval
permissions: {}

on:
  push:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/**'

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  RUSTFLAGS: "-D warnings"

# Set default shell
defaults:
  run:
    shell: bash

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install ripgrep (for grep_search)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build
        run: cargo build --locked --workspace --quiet

      - name: Run tool smoke harness
        run: |
          set -euo pipefail
          bash scripts/test_tools_e2e.sh | tee tool-eval.log
          bash scripts/test_pty_tools.sh | tee -a tool-eval.log

      - name: Upload eval artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: tool-eval-artifacts
          path: |
            tool-eval.log
            tool-eval.json
