# Type: `array`
auto_clear_paths = [
    ".vtcode/bin",
    "~/.vtcode/bin",
]

# Attempt to clear quarantine automatically (opt-in)
# Possible values: opt-in
# Default: false
# Type: `boolean`
auto_clear_quarantine = false

# Warn when a quarantined executable is detected
# Default: true
# Type: `boolean`
warn_on_quarantine = true


# Skills
# Skill discovery, rendering, and loading behavior.
[skills]
# Enable auto-trigger on $skill-name mentions
# Default: true
# Type: `boolean`
enable-auto-trigger = true

# Enable description-based keyword matching for auto-trigger
# Default: true
# Type: `boolean`
enable-description-matching = true

# Maximum number of skills to show in system prompt
# Default: 10
# Type: `integer`
max-skills-in-prompt = 10

# Minimum keyword matches required for description-based trigger
# Default: 2
# Type: `integer`
min-keyword-matches = 2

# Prompt format for skills section (Agent Skills spec) - "xml": XML wrapping for safety (Claude models
