[agent]
api_key_env = "OLLAMA_API_KEY"
default_model = "gpt-oss:120b-cloud"
provider = "ollama"
reasoning_effort = "low"
theme = "homebrew"

[agent.persistent_memory]
enabled = true

[provider.openai]
service_tier = "flex"

[permissions]
default_mode = "auto"

[telemetry]
atif_enabled = true
bottleneck_tracing = false

[tools.policies]
agent_info = "allow"
ask_user_question = "allow"
close_pty_session = "allow"
create_pty_session = "allow"
enter_plan_mode = "prompt"
exec_code = "allow"
execute_code = "allow"
exit_plan_mode = "prompt"
git_diff = "allow"
grep_file = "allow"
list_files = "allow"
list_pty_sessions = "allow"
list_skills = "allow"
load_skill = "allow"
load_skill_resource = "allow"
memory = "allow"
open_file = "allow"
plan_task_tracker = "prompt"
read_pty_session = "allow"
request_user_input = "allow"
resize_pty_session = "allow"
resume_agent = "allow"
run_pty_cmd = "allow"
search_file = "allow"
search_tools = "allow"
send_input = "allow"
skill = "allow"
spawn_agent = "allow"
task_tracker = "allow"
unified_exec = "allow"
unified_file = "allow"
wait_agent = "allow"
web_fetch = "allow"

[ui.terminal_title]
items = [
    "project",
    "spinner",
    "app-name",
    "git-branch",
]
