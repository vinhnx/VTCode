# Security Gate
# Approvals and blocking rules for risky actions.
[security]
# Automatically apply detected patch blocks in assistant replies when no write tool was executed.
# Defaults to false for safety.
# Default: false
# Type: `boolean`
auto_apply_detected_patches = false

# Encrypt payloads passed across executors.
# Default: false
# Type: `boolean`
encrypt_payloads = false

# Play terminal bell notification when HITL approval is required.
# Default: true
# Type: `boolean`
hitl_notification_bell = true

# Require human confirmation for critical actions
# Default: true
# Type: `boolean`
human_in_the_loop = true

# Enable runtime integrity tagging for critical paths.
# Default: true
# Type: `boolean`
integrity_checks = true

# Require a successful write tool before accepting claims like "I've updated the file" as applied.
# When true, such claims are treated as proposals unless a write tool executed successfully.
# Default: true
# Type: `boolean`
require_write_tool_for_claims = true

# Enable zero-trust checks between components.
# Default: false
# Type: `boolean`
zero_trust_mode = false

# Gatekeeper
# Extra approval checks and enforcement rules.
[security.gatekeeper]
# Paths eligible for quarantine auto-clear
