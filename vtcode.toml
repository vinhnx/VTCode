temperature = 0.3

# Enable small model for git history processing
# Default: true
# Type: `boolean`
use_for_git_history = true

# Enable small model for large file reads (>50KB)
# Default: true
# Type: `boolean`
use_for_large_reads = true

# Enable small model for web content summarization
# Default: true
