[package]
name = "vtcode-tools"
version.workspace = true
edition.workspace = true
rust-version = "1.88"
authors = ["Vinh Nguyen <vinhnguyen2308@gmail.com>"]
description = "Prototype extraction of VT Code's modular tool registry"
license.workspace = true
publish = false
categories = ["development-tools"]
keywords = ["vtcode", "tools", "registry", "modular", "ai-tools"]

[features]
default = ["bash", "search", "net", "planner"]

bash = []
search = []
net = []
planner = []
policies = []
examples = []

[dependencies]
vtcode-commons = { path = "../vtcode-commons", version = "0.93.2" }
vtcode-core = { path = "../vtcode-core", version = "0.93.2", default-features = false }
vtcode-acp = { path = "../vtcode-acp", version = "0.93.2" }
anyhow = { workspace = true }
async-trait = { workspace = true }
parking_lot = "0.12"
hashbrown = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
assert_fs = { workspace = true }
tokio = { workspace = true }
criterion = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "cache_bench"
harness = false
