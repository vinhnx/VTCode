[package]
name = "vtcode-tools"
version.workspace = true
edition.workspace = true
rust-version = "1.88"
authors = ["Vinh Nguyen <vinhnguyen2308@gmail.com>"]
description = "Prototype extraction of VT Code's modular tool registry"
license.workspace = true
publish = false
categories = ["development-tools"]
keywords = ["vtcode", "tools", "registry", "modular", "ai-tools"]

[features]
default = ["bash", "search", "net", "planner"]

bash = []
search = []
net = []
planner = []
policies = []
examples = []

[dependencies]
vtcode-commons = { path = "../vtcode-commons", version = "0.88.3" }
vtcode-core = { path = "../vtcode-core", version = "0.88.3", default-features = false }
vtcode-acp-client = { path = "../vtcode-acp-client", version = "0.88.3" }
anyhow = { workspace = true }
async-trait = { workspace = true }
hashbrown = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
assert_fs = { workspace = true }
tokio = { workspace = true }
criterion = { workspace = true }

[lints]
workspace = true
