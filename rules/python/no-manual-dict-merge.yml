id: no-manual-dict-merge
language: python
severity: hint
message: Use `{**a, **b}` or `a | b` (Python 3.9+) instead of looping to merge dicts.
note: |
  Manual dict merging via `for k, v in b.items(): a[k] = v` is verbose and
  error-prone. Use `{**a, **b}` for Python 3.5+ or `a | b` for Python 3.9+
  to merge dicts concisely. This rule detects the common loop-based merge
  pattern inside a function body. It does not flag merges with conditional
  logic or value transformation inside the loop.
rule:
  kind: for_statement
  has:
    pattern: $D[$K] = $V
    inside:
      kind: block
      stopBy: end
  has:
    pattern: $OTHER.items()
files:
  - "**/*.py"
  - "!tests/**"
  - "!**/test_*.py"
  - "!**/*_test.py"
