[package]
name = "vtcode-utility-tool-specs"
version.workspace = true
edition.workspace = true
rust-version = "1.88"
authors = ["Vinh Nguyen <vinhnguyen2308@gmail.com>"]
description = "Passive JSON schemas for VT Code utility, file, scheduling, and collaboration tool surfaces"
license.workspace = true
readme = "README.md"
homepage = "https://github.com/vinhnx/vtcode"
repository = "https://github.com/vinhnx/vtcode"
documentation = "https://docs.rs/vtcode-utility-tool-specs"
keywords = ["schemas", "tools", "file", "json", "vtcode"]
categories = ["development-tools", "data-structures"]
publish = true

[features]
default = []
mcp = ["dep:rmcp"]

[dependencies]
rmcp = { version = "=2.0.0", optional = true }
serde = { workspace = true }
serde_json = { workspace = true }

[package.metadata.docs.rs]
all-features = true
default-target = "x86_64-unknown-linux-gnu"
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[lib]
doctest = false
