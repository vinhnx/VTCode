id: no-unnecessary-boolean-literal-compare
valid:
  - |
      if (isValid) { proceed(); }
  - |
      if (!isReady) { wait(); }
  - |
      const x = a === b;
invalid:
  - |
      if (isValid === true) { proceed(); }
  - |
      if (isValid == true) { proceed(); }
  - |
      if (isValid !== false) { proceed(); }
