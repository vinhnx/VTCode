id: no-console-except-error
valid:
  - |
      logger.info("started");
  - |
      try {
        doWork();
      } catch (e) {
        console.error("failed", e);
      }
  - |
      // console.error in catch is allowed
      try {
        riskyOp();
      } catch (err) {
        console.error(err);
      }
invalid:
  - |
      console.log("debug output");
  - |
      console.warn("deprecated");
  - |
      console.debug("trace", value);
  - |
      console.error("outside catch block");
