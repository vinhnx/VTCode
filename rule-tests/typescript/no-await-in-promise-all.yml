id: no-await-in-promise-all
valid:
  - |
      const results = await Promise.all([fetchA(), fetchB(), fetchC()]);
  - |
      const [a, b] = await Promise.all([
        getUser(id),
        getProfile(id),
      ]);
  - |
      // await outside Promise.all is fine
      const value = await someAsync();
      await Promise.all([a, b]);
invalid:
  - |
      const results = await Promise.all([await fetchA(), await fetchB()]);
  - |
      const results = await Promise.all([
        await getUser(id),
        await getProfile(id),
      ]);
