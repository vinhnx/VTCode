id: avoid-jsx-short-circuit
snapshots:
  ? |-
    function App({ count }: { count: number }) {
      return <span>{count && <Badge />}</span>;
    }
  : fixed: |-
      function App({ count }: { count: number }) {
        return <span>{{count ? <Badge /> : null}}</span>;
      }
    labels:
    - source: count && <Badge />
      style: primary
      start: 61
      end: 79
    - source: '{count && <Badge />}'
      style: secondary
      start: 60
      end: 80
