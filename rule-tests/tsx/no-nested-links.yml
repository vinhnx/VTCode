id: no-nested-links
valid:
  - code: |
      function Nav() {
        return (
          <nav>
            <a href="/home">Home</a>
            <a href="/about">About</a>
          </nav>
        );
      }
  - code: |
      function Card() {
        return <a href="/detail"><span>Click here</span></a>;
      }
invalid:
  - code: |
      function Broken() {
        return (
          <a href="/outer">
            <a href="/inner">Inner link</a>
          </a>
        );
      }
  - code: |
      function AlsoBroken() {
        return (
          <a href="/parent">
            <div>
              <a href="/child">Nested deeply</a>
            </div>
          </a>
        );
      }
