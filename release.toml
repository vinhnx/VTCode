allow-branch = ["main"]
shared-version = false
dependent-version = "upgrade"
consolidate-commits = true
push = true
push-remote = "origin"
publish = true
tag-name = "{{version}}"
tag-message = "Release {{version}}"
# Skip pre-release tests - they should be run manually before release
# Snapshot tests can fail and block releases; run `cargo nextest run` manually instead
pre-release-hook = []
[rate-limit]
new-packages = 5
existing-packages = 300
pre-release-commit-message = "chore(release): bump version to {{version}} [skip ci]"
sign-commit = false
sign-tag = false
