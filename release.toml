allow-branch = ["main"]
shared-version = false
dependent-version = "upgrade"
consolidate-commits = true
push = true
push-remote = "origin"
publish = true
tag-name = "{{version}}"
tag-message = "Release {{version}}"
# Wait between publishing crates to allow crates.io indexing
# Prevents "failed to select a version" errors for dependent crates
publish-timeout = 30
[rate-limit]
new-packages = 5
existing-packages = 300
pre-release-commit-message = "chore(release): bump version to {{version}} [skip ci]"
sign-commit = false
sign-tag = false
