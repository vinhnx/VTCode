# Clippy configuration for vtcode
# Based on best practices from https://rust-lang.github.io/rust-clippy/master/index.html

# Minimum supported Rust version
msrv = "1.70.0"

# Cognitive complexity threshold for functions
cognitive-complexity-threshold = 75

# Too many arguments threshold for functions
too-many-arguments-threshold = 9

# Disallow specific methods that should be avoided
disallowed-methods = [
    { path = "std::panic", reason = "Use anyhow/thiserror for error handling instead" },
    { path = "std::unwrap", reason = "Use proper error handling with ? or match" },
    { path = "std::expect", reason = "Use proper error handling with ? or match" },
]

# Allow absolute paths from specific crates (for project structure)
absolute-paths-allowed-crates = [
    "vtcode",
    "vtcode-core",
    "vtcode-commons",
    "vtcode-config",
    "vtcode-tui",
    "vtcode-llm",
    "vtcode-lmstudio",
    "vtcode-markdown-store",
    "vtcode-indexer",
    "vtcode-tools",
    "vtcode-bash-runner",
    "vtcode-exec-events",
    "vtcode-file-search",
    "vtcode-acp-client",
    "vtcode-process-hardening",
]

# Suppress arithmetic checks for specific types where overflow is expected
arithmetic-side-effects-allowed = [
    "u8", "u16", "u32", "u64", "u128", "usize",
    "i8", "i16", "i32", "i64", "i128", "isize",
]

# Allow specific types that may have interior mutability
interior-mutable-allow-list = [
    "std::sync::atomic::AtomicBool",
    "std::sync::atomic::AtomicUsize",
    "std::cell::RefCell",
    "std::cell::Cell",
    "parking_lot::Mutex",
    "parking_lot::RwLock",
    "tokio::sync::Mutex",
    "tokio::sync::RwLock",
]

# Lint groups configuration
# Correctness lints (deny by default - catches outright errors)
[lints]
correctness = "deny"

# Suspicious lints (warn by default - likely incorrect)
suspicious = "warn"

# Style lints (warn by default - idiomatic Rust)
style = "warn"

# Complexity lints (warn by default - can be simplified)
complexity = "warn"

# Performance lints (warn by default - performance improvements)
perf = "warn"

# Pedantic lints (allow by default - very strict, enable selectively)
pedantic = "allow"

# Restriction lints (allow by default - highly opinionated)
restriction = "allow"

# Nursery lints (allow by default - new and experimental)
nursery = "allow"

# Cargo lints (allow by default - Cargo.toml metadata)
cargo = "allow"

# Specific lint overrides
[lints.clippy]
# Allow unwrap in tests and examples
unwrap_used = "warn"  # Changed from deny to warn for practical development
expect_used = "warn"  # Changed from deny to warn for practical development

# Allow dbg! in development (can be changed to deny for production)
dbg_macro = "warn"

# Allow todo! and unimplemented! during development
todo = "warn"
unimplemented = "warn"

# Allow panic in error handling contexts
panic = "warn"

# Allow missing documentation in general (can be enabled for public APIs)
missing_docs_in_private_items = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

# Allow module name repetition (common in Rust project structure)
module_name_repetitions = "allow"

