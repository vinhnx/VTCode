[package]
name = "vtcode-memory"
version.workspace = true
edition = "2024"
rust-version = "1.93.0"
authors = ["Vinh Nguyen <vinhnguyen2308@gmail.com>"]
description = "Unified per-session state store: append-only ThreadEvent log plus derived views, retention, and cross-session query."
license.workspace = true
readme = "README.md"
homepage = "https://github.com/vinhnx/vtcode"
repository = "https://github.com/vinhnx/vtcode"
documentation = "https://docs.rs/vtcode-memory"
keywords = ["vtcode", "agent", "session", "state", "event-log"]
categories = ["development-tools", "data-structures"]

[dependencies]
vtcode-exec-events = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true }
walkdir = "2.5"
thiserror = { workspace = true }
uuid = { workspace = true }
lru = "0.18"

[dev-dependencies]
tempfile = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
