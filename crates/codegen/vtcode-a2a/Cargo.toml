[package]
name = "vtcode-a2a"
version.workspace = true
edition.workspace = true
rust-version = "1.88"
authors = ["Vinh Nguyen <vinhnguyen2308@gmail.com>"]
description = "Agent2Agent (A2A) Protocol support for VT Code"
license.workspace = true
readme = "README.md"
homepage = "https://github.com/vinhnx/vtcode"
repository = "https://github.com/vinhnx/vtcode"
documentation = "https://docs.rs/vtcode-a2a"
categories = ["development-tools"]
keywords = ["vt", "a2a", "agent", "protocol"]
publish = false

[features]
default = []
a2a-server = ["dep:axum", "dep:tower", "dep:tower-http", "dep:tokio-stream"]

[dependencies]
anyhow = { workspace = true }
async-stream = "0.3"
axum = { version = "0.8", features = ["json", "macros"], optional = true }
base64 = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true, features = ["derive"] }
futures = { workspace = true }
hashbrown = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util", "macros", "rt-multi-thread", "sync"] }
tokio-stream = { version = "0.1", optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.7", features = ["cors", "trace"], optional = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }

[package.metadata.docs.rs]
all-features = true
default-target = "x86_64-unknown-linux-gnu"
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.cargo-machete]
# Optional deps enabled by the `a2a-server` feature; cargo-machete cannot
# resolve feature-gated usage and would otherwise false-positive these.
ignored = ["tokio-stream", "tower"]

[lints]
workspace = true
